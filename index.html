@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a3a5c;font-family:'Outfit',sans-serif;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block;position:fixed;top:0;left:0}
#hud{position:fixed;top:0;left:0;right:0;height:64px;display:flex;justify-content:space-between;align-items:center;padding:0 10px;background:linear-gradient(180deg,rgba(0,20,40,0.85),rgba(0,20,40,0.5));z-index:10}
.hs{display:flex;align-items:center;gap:8px}
.hs .av{width:48px;height:48px;border-radius:50%;overflow:hidden;border:2px solid rgba(255,255,255,0.5);background:#333}
.hs .av canvas{width:48px;height:48px;image-rendering:pixelated}
.hs .info{display:flex;flex-direction:column}
.hs .name{font-size:10px;color:rgba(255,255,255,0.6);letter-spacing:1px;text-transform:uppercase}
.hs .pts{font-size:22px;font-weight:900;color:#fff}
#score-center{position:fixed;top:4px;left:50%;transform:translateX(-50%);z-index:11;text-align:center}
#score-center .games-display{font-size:20px;font-weight:900;color:#fff;letter-spacing:4px}
#score-center .set-label{font-size:8px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:2px}
#jz{position:fixed;bottom:14px;left:14px;width:130px;height:130px;z-index:20}
#jb{width:130px;height:130px;border-radius:50%;background:rgba(0,0,0,0.25);border:2px solid rgba(255,255,255,0.2);position:relative}
#jn{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,0.25);border:2px solid rgba(255,255,255,0.35);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
#hbtn{position:fixed;bottom:32px;right:22px;width:82px;height:82px;border-radius:50%;background:linear-gradient(135deg,#fdd835,#f9a825);border:3px solid rgba(255,255,255,0.5);color:#5d4037;font-size:14px;font-weight:900;cursor:pointer;z-index:20;box-shadow:0 4px 15px rgba(0,0,0,0.3)}
#hbtn:active{transform:scale(0.9)}
#lobbtn{position:fixed;bottom:120px;right:30px;width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#81d4fa,#039be5);border:3px solid rgba(255,255,255,0.4);color:#fff;font-size:11px;font-weight:900;cursor:pointer;z-index:20;box-shadow:0 3px 12px rgba(0,0,0,0.25)}
#lobbtn:active{transform:scale(0.9)}
.game-ui{display:none}
#install-hint{position:fixed;bottom:0;left:0;right:0;background:rgba(0,20,40,0.95);color:#fff;padding:16px 20px;z-index:200;display:none;flex-direction:column;align-items:center;gap:8px;border-top:2px solid #42a5f5;font-family:'Outfit',sans-serif}
#install-hint .ih-title{font-size:14px;font-weight:700;color:#64b5f6}
#install-hint .ih-text{font-size:12px;color:rgba(255,255,255,0.7);text-align:center;line-height:1.5}
#install-hint .ih-icon{font-size:22px}
#install-hint .ih-close{position:absolute;top:8px;right:12px;background:none;border:none;color:rgba(255,255,255,0.5);font-size:18px;cursor:pointer}

#splash{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;justify-content:center;align-items:center;background:linear-gradient(135deg,#0d47a1,#1565c0,#1e88e5);overflow:hidden}
#splash .bg-ball{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#eeff41,#aeea00);opacity:0.06;top:-80px;right:-60px}
#splash .bg-ball2{position:absolute;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#64b5f6,#1e88e5);opacity:0.08;bottom:-40px;left:-40px}
#splash h1{font-size:42px;font-weight:900;color:#fff;letter-spacing:6px;text-shadow:0 4px 20px rgba(0,0,0,0.3);z-index:1}
#splash .sub{font-size:14px;color:rgba(255,255,255,0.6);margin-top:4px;letter-spacing:4px;z-index:1}
#splash .start-btn{margin-top:40px;padding:16px 50px;font-family:inherit;font-size:16px;font-weight:700;background:rgba(255,255,255,0.15);color:#fff;border:2px solid rgba(255,255,255,0.4);border-radius:40px;cursor:pointer;z-index:1;letter-spacing:2px}
#splash .racket-icon{font-size:60px;margin-bottom:10px;z-index:1}
.version{position:absolute;bottom:12px;font-size:9px;color:rgba(255,255,255,0.25);letter-spacing:2px}
#charselect{position:fixed;inset:0;z-index:90;display:none;flex-direction:column;align-items:center;background:linear-gradient(180deg,#0d47a1,#1565c0);padding:16px 10px;overflow-y:auto}
#charselect h2{font-size:18px;font-weight:900;color:#fff;letter-spacing:3px;margin-bottom:2px}
#charselect .step-label{font-size:13px;color:#64b5f6;font-weight:700;margin-bottom:4px}
#charselect .hint{font-size:11px;color:rgba(255,255,255,0.45);margin-bottom:12px}
.char-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:380px}
.char-card{background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.12);border-radius:14px;padding:12px 8px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;transition:all 0.15s}
.char-card:hover,.char-card.sel{border-color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.15)}
.char-card.sel-p1{border-color:#42a5f5;background:rgba(66,165,245,0.2)}
.char-card.sel-p2{border-color:#ef5350;background:rgba(239,83,80,0.2)}
.char-card.disabled{opacity:0.3;pointer-events:none}
.char-card .avatar-wrap{width:56px;height:56px;border-radius:50%;overflow:hidden;background:#333;border:2px solid rgba(255,255,255,0.3)}
.char-card .avatar-wrap canvas{width:56px;height:56px;image-rendering:pixelated}
.char-card .cname{font-size:12px;font-weight:700;color:#fff}
.char-card .cdesc{font-size:9px;color:rgba(255,255,255,0.5)}
.stats{width:100%;display:flex;flex-direction:column;gap:3px}
.stat-row{display:flex;align-items:center;gap:5px;font-size:8px;color:rgba(255,255,255,0.6)}
.stat-row .stat-label{width:42px;text-align:right}
.stat-bar{flex:1;height:5px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden}
.stat-fill{height:100%;border-radius:3px}
.stat-spd .stat-fill{background:linear-gradient(90deg,#4fc3f7,#0288d1)}
.stat-pwr .stat-fill{background:linear-gradient(90deg,#ff8a65,#e53935)}
.stat-rch .stat-fill{background:linear-gradient(90deg,#81c784,#2e7d32)}
.stat-sta .stat-fill{background:linear-gradient(90deg,#ffcc80,#ef6c00)}
#play-btn{margin-top:14px;padding:14px 50px;font-family:inherit;font-size:15px;font-weight:700;background:#43a047;color:#fff;border:none;border-radius:30px;cursor:pointer;letter-spacing:2px;opacity:0.4;pointer-events:none}
#play-btn.ready{opacity:1;pointer-events:auto}
#gameover{position:fixed;inset:0;z-index:80;display:none;flex-direction:column;justify-content:center;align-items:center;background:rgba(0,20,40,0.92);gap:12px}
#gameover h1{font-size:28px;font-weight:900;color:#64b5f6;letter-spacing:3px}
#gameover p{font-size:16px;color:#90caf9}
#gameover button{margin-top:10px;padding:14px 40px;font-family:inherit;font-size:15px;font-weight:700;background:#1e88e5;color:#fff;border:none;border-radius:30px;cursor:pointer}
</style>
</head>

function drawAvatar(ch,size){
  var cv=document.createElement('canvas');cv.width=size;cv.height=size;
  var x=cv.getContext('2d');
  if(preloadedImgs[ch.id]){
    x.drawImage(preloadedImgs[ch.id],0,0,size,size);
  } else if(CHAR_IMGS[ch.id]){
    var img=new Image();img.src=CHAR_IMGS[ch.id];
    img.onload=function(){x.drawImage(img,0,0,size,size);preloadedImgs[ch.id]=img;};
  } else {
    var s=size/48;x.fillStyle=ch.shirt;x.beginPath();x.arc(24*s,24*s,20*s,0,Math.PI*2);x.fill();
  }
  return cv;
}

var audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function playTone(freq,dur,type,vol){
  if(!audioCtx)return;
  var o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type||'sine';o.frequency.value=freq;
  g.gain.setValueAtTime(vol||0.15,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur);
}
function sndHit(){playTone(600,0.08,'square',0.12);setTimeout(function(){playTone(800,0.05,'square',0.08);},30);}

function buildCharGrid(){
  cgrid.innerHTML='';

  stepHint.textContent='';
  playBtn.classList.remove('ready');

    if(selectStep===2&&chosenP1&&ch.id===chosenP1.id)card.className+=' disabled';
    var awrap=document.createElement('div');awrap.className='avatar-wrap';
    if(CHAR_IMGS[ch.id]){var aimg=document.createElement('img');aimg.src=CHAR_IMGS[ch.id];aimg.style.cssText='width:56px;height:56px;border-radius:50%;object-fit:cover';awrap.appendChild(aimg);}
    else awrap.appendChild(drawAvatar(ch,128));
    var nm=document.createElement('div');nm.className='cname';nm.textContent=ch.name;
    var desc=document.createElement('div');desc.className='cdesc';desc.textContent=ch.desc;
    var stats=document.createElement('div');stats.className='stats';
    stats.innerHTML='<div class="stat-row stat-spd"><span class="stat-label">Speed</span><div class="stat-bar"><div class="stat-fill" style="width:'+Math.round(ch.speed*100)+'%"></div></div></div><div class="stat-row stat-pwr"><span class="stat-label">Power</span><div class="stat-bar"><div class="stat-fill" style="width:'+Math.round(ch.power*100)+'%"></div></div></div><div class="stat-row stat-rch"><span class="stat-label">Reach</span><div class="stat-bar"><div class="stat-fill" style="width:'+Math.round(ch.reach*100)+'%"></div></div></div><div class="stat-row stat-sta"><span class="stat-label">Ausdauer</span><div class="stat-bar"><div class="stat-fill" style="width:'+Math.round(ch.stamina*100)+'%"></div></div></div>';
    card.appendChild(awrap);card.appendChild(nm);card.appendChild(desc);card.appendChild(stats);cgrid.appendChild(card);
    card.addEventListener('click',function(){
      if(selectStep===2&&chosenP1&&ch.id===chosenP1.id)return;
      var all=cgrid.querySelectorAll('.char-card');for(var i=0;i<all.length;i++){all[i].classList.remove('sel','sel-p1','sel-p2');}
      card.classList.add('sel',selectStep===1?'sel-p1':'sel-p2');
      if(selectStep===1)chosenP1=ch;else chosenP2=ch;
      playBtn.classList.add('ready');playBtn.textContent=selectStep===1?'WEITER →':"LOS GEHT'S";
    });
  });
}

var jb2=document.getElementById('jb'),jn2=document.getElementById('jn'),jxv=0,jyv=0,jact=false;
function jm(tx,ty){var r=jb2.getBoundingClientRect();var dx=tx-(r.left+r.width/2),dy=ty-(r.top+r.height/2);var d=Math.min(Math.sqrt(dx*dx+dy*dy),38);var a=Math.atan2(dy,dx);var mx=Math.cos(a)*d,my=Math.sin(a)*d;jn2.style.transform='translate(calc(-50% + '+mx+'px),calc(-50% + '+my+'px))';jxv=mx/38;jyv=my/38;}
jb2.addEventListener('touchstart',function(e){e.preventDefault();jact=true;jm(e.touches[0].clientX,e.touches[0].clientY);});
jb2.addEventListener('touchmove',function(e){e.preventDefault();if(jact)jm(e.touches[0].clientX,e.touches[0].clientY);});
jb2.addEventListener('touchend',function(){jact=false;jn2.style.transform='translate(-50%,-50%)';jxv=0;jyv=0;});
jb2.addEventListener('mousedown',function(e){jact=true;jm(e.clientX,e.clientY);});
window.addEventListener('mousemove',function(e){if(jact)jm(e.clientX,e.clientY);});
window.addEventListener('mouseup',function(){if(jact){jact=false;jn2.style.transform='translate(-50%,-50%)';jxv=0;jyv=0;}});

// ====== SCORING ======
var PNAMES=['0','15','30','40'],gamesP=0,gamesC=0,pointsP=0,pointsC=0,advantage=null;
function pointStr(pts,other,adv,who){if(pts>=3&&other>=3){if(adv===who)return'AD';if(adv!==null)return'-';return'40';}return PNAMES[Math.min(pts,3)];}
function updateScoreUI(){document.getElementById('pts1').textContent=pointStr(pointsP,pointsC,advantage,'p');document.getElementById('pts2').textContent=pointStr(pointsC,pointsP,advantage,'c');document.getElementById('g1').textContent=gamesP;document.getElementById('g2').textContent=gamesC;}

function awardPoint(who){
  if(who==='p')pointsP++;else pointsC++;
  var pp=pointsP,pc=pointsC;
  if(pp>=4||pc>=4){
    if(pp>=3&&pc>=3){if(pp===pc){advantage=null;}else if(pp>pc){if(advantage==='p'){winGame('p');return;}else{advantage='p';pointsP=3;pointsC=3;}}else{if(advantage==='c'){winGame('c');return;}else{advantage='c';pointsP=3;pointsC=3;}}}
    else{if(pp>=4){winGame('p');return;}if(pc>=4){winGame('c');return;}}
  }
  updateScoreUI();resetPoint(gameServer);
}

function winGame(who){
  if(who==='p')gamesP++;else gamesC++;
  pointsP=0;pointsC=0;advantage=null;updateScoreUI();
  // Alternate server each game
  gameServer=(gameServer==='p')?'c':'p';
  // Start celebration
  celebWinner=who;celebTimer=260;celebTears=[];sndGameWon();
  for(var i=0;i<8;i++)celebTears.push({x:0,y:0,vy:0.3+Math.random()*0.8,vx:(Math.random()-0.5)*0.6,delay:Math.floor(Math.random()*60),age:0});
  playing=false;
  if(gamesP>=6||gamesC>=6){
    setTimeout(function(){celebTimer=0;winMatch(who);},4500);
  } else {
    setTimeout(function(){celebTimer=0;resetPoint(gameServer);},4500);
  }
}

function winMatch(who){
  playing=false;hideGameUI();
  setTimeout(function(){
    document.getElementById('go-title').textContent=who==='p'?'GEWONNEN! 🏆':'VERLOREN!';
    document.getElementById('go-score').textContent=gamesP+' - '+gamesC+' Spiele';
    gameover.style.display='flex';
  },300);
}

var wallBounced=false; // back wall bounce used this rally
var serving,sOwner,lastH,hcP,hcC,swP,swC,ticks,playing=false;
var particles=[],celebWinner=null,celebTimer=0,celebTears=[];
var cpuReactDelay=0,cpuMissChance=0;
var serveSide=0,gameServer='p';
var matchPointMsg='',matchPointTimer=0;
var perfectHit=0;
var sweatParts=[];
var cpuServeTimer=0; // frame counter for CPU serve delay
var CL,CR,CT,CB,NY;
function calcCourt(){var cw=Math.min(CW-20,400);CL=(CW-cw)/2;CR=CL+cw;CT=HUD+10;CB=CH-10;NY=CT+(CB-CT)*0.48;}

function showGameUI(){document.getElementById('hud').style.display='flex';document.getElementById('jz').style.display='block';document.getElementById('hbtn').style.display='block';document.getElementById('lobbtn').style.display='block';}
function hideGameUI(){var els=document.querySelectorAll('.game-ui');for(var i=0;i<els.length;i++)els[i].style.display='none';}

function startMatch(){
  playerChar=chosenP1;cpuChar=chosenP2;
  var a1=document.getElementById('av1');a1.innerHTML='';
  if(CHAR_IMGS[playerChar.id]){var i1=document.createElement('img');i1.src=CHAR_IMGS[playerChar.id];i1.style.cssText='width:48px;height:48px;border-radius:50%;object-fit:cover';a1.appendChild(i1);}
  else a1.appendChild(drawAvatar(playerChar,96));
  document.getElementById('pname1').textContent=playerChar.name;
  var a2=document.getElementById('av2');a2.innerHTML='';
  if(CHAR_IMGS[cpuChar.id]){var i2=document.createElement('img');i2.src=CHAR_IMGS[cpuChar.id];i2.style.cssText='width:48px;height:48px;border-radius:50%;object-fit:cover';a2.appendChild(i2);}
  else a2.appendChild(drawAvatar(cpuChar,96));
  document.getElementById('pname2').textContent=cpuChar.name;
  gamesP=0;gamesC=0;pointsP=0;pointsC=0;advantage=null;celebTimer=0;
  gameServer='p';serveSide=0;
  updateScoreUI();showGameUI();resetPoint(gameServer);
}

function checkMatchPoint(){
  var pp=pointsP,pc=pointsC;
  var pGame=(pp>=3&&pc<3)||(pp>=3&&pc>=3&&advantage==='p');
  var cGame=(pc>=3&&pp<3)||(pp>=3&&pc>=3&&advantage==='c');
  if(pGame&&gamesP>=5){matchPointMsg='MATCHBALL '+playerChar.name+'!';matchPointTimer=120;return;}
  if(cGame&&gamesC>=5){matchPointMsg='MATCHBALL '+cpuChar.name+'!';matchPointTimer=120;return;}
  if(pGame){matchPointMsg=playerChar.name+': Spielball!';matchPointTimer=120;return;}
  if(cGame){matchPointMsg=cpuChar.name+': Spielball!';matchPointTimer=120;return;}
  matchPointMsg='';matchPointTimer=0;
}

function resetPoint(server){
  calcCourt();ppx=CW/2;ppy=NY+(CB-NY)*0.6;cpx=CW/2;cpy=CT+(NY-CT)*0.4;
  bvx=0;bvy=0;bOn=false;ballZ=0;ballVZ=0;ballSpin=0;wallBounced=false;
  serving=true;sOwner=server;lastH=null;
  hcP=0;hcC=0;swP=0;swC=0;ticks=0;playing=true;perfectHit=0;
  cpuReactDelay=Math.round(18-cpuChar.speed*12);
  cpuMissChance=0.15-cpuChar.speed*0.1;
  checkMatchPoint();
  if(server==='p'){bx=ppx;by=ppy-30;cpuServeTimer=0;}
  else{bx=cpx;by=cpy+20;cpuServeTimer=45;} // CPU serves after 45 frames
}

// Helper: do a hit with physics
function doHit(isPlayer,isLob){
  var cx=isPlayer?ppx:cpx, cy=isPlayer?ppy:cpy;
  var dx=bx-cx,dy=by-cy,di=Math.sqrt(dx*dx+dy*dy);
  var ch=isPlayer?playerChar:cpuChar;
  var reach=35+ch.reach*25;
  var inRange=di<reach;
  var correctSide=isPlayer?(by>NY):(by<NY&&bvy<1);
  if(!inRange||!correctSide)return false;

  // Sweet spot: closer = more power
  var sweetRatio=1.0-di/reach; // 1.0=perfect, 0=edge
  var powerMult=0.7+sweetRatio*0.5; // 0.7 to 1.2
  if(sweetRatio>0.7){perfectHit=20;playTone(1200,0.06,'sine',0.1);} // perfect!

  // Net proximity volley bonus
  var netDist=Math.abs(cy-NY);
  var volleyBonus=(netDist<60)?1.3:1.0;

  var basePower=3+ch.power*1.8;

  if(isLob){
    // LOB: high ball, slow, deep
    var dir=isPlayer?-1:1;
    bvx=dx*0.03+(Math.random()-0.5)*0.5;
    bvy=dir*(1.5+ch.power*0.5);
    ballZ=15;ballVZ=0.3; // goes very high
    ballSpin=(Math.random()-0.5)*0.2;
  } else {
    // Normal hit or SMASH (if ball is high)
    var isSmash=ballZ>6;
    var dir=isPlayer?-1:1;
    var power=basePower*powerMult*volleyBonus*(isSmash?1.4:1.0);
    bvx=dx*0.08+(Math.random()-0.5)*1.5;
    bvy=dir*power;
    ballZ=isSmash?1:3;ballVZ=isSmash?0:0.15;
    // Spin from joystick direction
    if(isPlayer){ballSpin=jxv*0.5;}else{ballSpin=(Math.random()-0.5)*0.4;}
    if(isSmash){playTone(300,0.1,'square',0.15);} // smash sound
  }

  wallBounced=false; // reset wall bounce for new rally direction
  if(isPlayer){hcP=12;lastH='p';swP=12;addBurst(bx,by,ch.shirt);sndHit();}
  else{hcC=18;lastH='c';swC=12;addBurst(bx,by,ch.shirt);sndHit();}
  return true;
}

function update(){
  if(celebTimer>0){celebTimer--;return;}
  if(!playing)return;
  ticks++;calcCourt();

  var mx=jxv,my=jyv;
  if(keys['ArrowLeft']||keys['KeyA'])mx=-1;if(keys['ArrowRight']||keys['KeyD'])mx=1;
  if(keys['ArrowUp']||keys['KeyW'])my=-1;if(keys['ArrowDown']||keys['KeyS'])my=1;

  var totalGames=gamesP+gamesC;
  var pStaminaMult=1.0-(1.0-playerChar.stamina)*totalGames*0.06;
  if(pStaminaMult<0.55)pStaminaMult=0.55;
  var pSpd=(2.2+playerChar.speed*2.2)*pStaminaMult;
  ppx+=mx*pSpd;ppy+=my*pSpd;
  ppx=Math.max(CL+20,Math.min(CR-20,ppx));ppy=Math.max(NY+30,Math.min(CB-20,ppy));

  // Fatigue sweat particles
  if(pStaminaMult<0.75&&ticks%15===0){
    sweatParts.push({x:ppx+(Math.random()-0.5)*10,y:ppy-20,vy:-0.5-Math.random(),vx:(Math.random()-0.5)*0.5,l:25});
  }
  var cStaminaMult=1.0-(1.0-cpuChar.stamina)*totalGames*0.06;
  if(cStaminaMult<0.55)cStaminaMult=0.55;
  if(cStaminaMult<0.75&&ticks%15===0){
    sweatParts.push({x:cpx+(Math.random()-0.5)*10,y:cpy-20,vy:-0.5-Math.random(),vx:(Math.random()-0.5)*0.5,l:25});
  }

  // CPU AI
  if(bOn){
    var tx,ty;
    if(bvy<0){
      if(ticks>cpuReactDelay){
        var predErr=(Math.random()-0.5)*(45-cpuChar.speed*35);
        tx=bx+bvx*6+predErr;ty=by+bvy*5;
      } else {tx=CW/2;ty=CT+(NY-CT)*0.4;}
    }else{tx=CW/2;ty=CT+(NY-CT)*0.35;}
    tx=Math.max(CL+20,Math.min(CR-20,tx));ty=Math.max(CT+20,Math.min(NY-30,ty));
    var dd=Math.sqrt((tx-cpx)*(tx-cpx)+(ty-cpy)*(ty-cpy));
    var cSpd=(1.5+cpuChar.speed*1.8)*cStaminaMult;
    if(dd>2){cpx+=(tx-cpx)/dd*Math.min(cSpd,dd);cpy+=(ty-cpy)/dd*Math.min(cSpd,dd);}
  }

  if(hcP>0)hcP--;if(hcC>0)hcC--;if(swP>0)swP--;if(swC>0)swC--;
  if(matchPointTimer>0)matchPointTimer--;
  if(perfectHit>0)perfectHit--;

  // CPU serve via frame counter (no setTimeout)
  if(serving&&sOwner==='c'&&cpuServeTimer>0){
    cpuServeTimer--;
    if(cpuServeTimer<=0){
      bOn=true;
      bvx=(Math.random()-0.5)*1.5;
      bvy=3.0;
      ballZ=3;ballVZ=0;ballSpin=0;
      hcP=25;hcC=35;
      serving=false;lastH='c';swC=12;sndServe();serveSide=1-serveSide;
    }
  }

  var wh=hitOn||keys['Space'];
  var wl=lobOn||keys['KeyL'];

  // Player serve
  if(serving&&sOwner==='p'&&(wh||wl)){
    var serveDir=mx||((serveSide===0)?0.5:-0.5);
    bOn=true;bvx=serveDir*2.5;bvy=-(2.5+playerChar.power*2);
    ballZ=3;ballVZ=0.2;ballSpin=mx*0.3;wallBounced=false;
    serving=false;lastH='p';swP=12;sndServe();serveSide=1-serveSide;
  }

  // Player hit
  if(!serving&&(wh||wl)&&hcP<=0&&bOn){doHit(true,wl);}

  // CPU hit
  if(!serving&&bOn&&hcC<=0){
    var dx2=bx-cpx,dy2=by-cpy,di2=Math.sqrt(dx2*dx2+dy2*dy2);
    var cReach=35+cpuChar.reach*25;
    if(di2<cReach&&by<NY&&bvy<1){
      if(Math.random()<cpuMissChance){swC=12;hcC=20;}
      else{
        // CPU decides: lob if far from net, smash if ball high
        var cpuLob=(di2>cReach*0.7&&Math.random()<0.25);
        doHit(false,cpuLob);
      }
    }
  }

  // Ball physics
  if(bOn){
    bx+=bvx;by+=bvy;
    bvx*=0.998;
    // Apply spin curve
    bvx+=ballSpin*0.03;
    ballSpin*=0.995;
    // Ball height (gravity pulls DOWN)
    ballZ+=ballVZ;ballVZ-=0.02;
    if(ballZ<0){ballZ=0;ballVZ=0;}
    if(ballZ>20){ballZ=20;}

    // Side wall bounce
    if(bx<CL+5){bx=CL+5;bvx=Math.abs(bvx)*0.8;ballSpin*=-0.5;sndBounce();}
    if(bx>CR-5){bx=CR-5;bvx=-Math.abs(bvx)*0.8;ballSpin*=-0.5;sndBounce();}

    // Out of bounds → point
    if(by<CT-20){playing=false;sndPoint();setTimeout(function(){awardPoint(lastH==='p'?'p':'c');},300);return;}
    if(by>CB+20){playing=false;sndPoint();setTimeout(function(){awardPoint(lastH==='c'?'c':'p');},300);return;}
  }

  // Update particles
  for(var i=particles.length-1;i>=0;i--){var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.l--;p.vx*=.93;p.vy*=.93;if(p.l<=0)particles.splice(i,1);}
  for(var i=sweatParts.length-1;i>=0;i--){var s=sweatParts[i];s.x+=s.vx;s.y+=s.vy;s.l--;if(s.l<=0)sweatParts.splice(i,1);}
}

function addBurst(x,y,col){for(var i=0;i<10;i++)particles.push({x:x,y:y,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6,l:25,c:col});}

// ====== DRAW PERSON ======
// faceDown=true means we see the FACE (looking toward us)
// faceDown=false means we see the BACK
function drawPerson(x,y,faceDown,ch,swing){
  c.save();c.translate(Math.round(x),Math.round(y));
  var t=ticks*0.12,bob=Math.sin(t)*1.5,sw=swing>0;

  c.fillStyle='rgba(0,0,0,0.13)';c.beginPath();c.ellipse(0,26+bob,18,6,0,0,Math.PI*2);c.fill();
  c.fillStyle=ch.skin;c.fillRect(-6,12+bob,4,12);c.fillRect(2,12+bob,4,12);
  c.fillStyle='#fff';c.fillRect(-7,22+bob,6,4);c.fillRect(1,22+bob,6,4);
  c.fillStyle=ch.shirt;c.fillRect(-6,24+bob,4,1);c.fillRect(2,24+bob,4,1);
  c.fillStyle=ch.shorts;c.fillRect(-8,6+bob,16,8);
  c.fillStyle=ch.trim;c.fillRect(-8,12+bob,16,2);
  c.fillStyle=ch.shirt;c.fillRect(-10,-8+bob,20,16);
  c.fillStyle='#fff';c.fillRect(-4,-8+bob,8,3);
  c.fillStyle=ch.trim;c.fillRect(-10,-8+bob,20,2);
  c.fillStyle=ch.skin;c.fillRect(-14,-6+bob,4,12);
  c.fillStyle=ch.skin;
  if(sw){c.fillRect(10,-6+bob,4,6);c.fillStyle='#8B4513';c.fillRect(12,-16+bob,3,10);c.fillStyle='rgba(100,200,255,0.4)';c.fillRect(8,-26+bob,11,12);c.strokeStyle='#555';c.lineWidth=1.5;c.strokeRect(8,-26+bob,11,12);}
  else{c.fillRect(10,-6+bob,4,12);c.fillStyle='#8B4513';c.fillRect(14,0+bob,8,3);c.fillStyle='rgba(100,200,255,0.4)';c.fillRect(22,-6+bob,10,14);c.strokeStyle='#555';c.lineWidth=1.5;c.strokeRect(22,-6+bob,10,14);}

  c.fillStyle=ch.skin;c.beginPath();c.arc(0,-16+bob,10,0,Math.PI*2);c.fill();
  if(faceDown){
    // Face visible
    c.fillStyle=ch.hair;c.beginPath();c.arc(0,-19+bob,10,Math.PI,2*Math.PI);c.fill();c.fillRect(-10,-26+bob,20,5);
    c.fillStyle=ch.shirt;c.fillRect(-10,-22+bob,20,3);
    c.fillStyle='#222';c.beginPath();c.arc(-4,-17+bob,1.5,0,Math.PI*2);c.fill();c.beginPath();c.arc(4,-17+bob,1.5,0,Math.PI*2);c.fill();
    c.fillStyle='#fff';c.beginPath();c.arc(-4,-17.5+bob,0.6,0,Math.PI*2);c.fill();c.beginPath();c.arc(4,-17.5+bob,0.6,0,Math.PI*2);c.fill();
    c.fillStyle='#b0785a';c.fillRect(-2,-12+bob,4,2);
  }else{
    // Back of head
    c.fillStyle=ch.hair;c.beginPath();c.arc(0,-18+bob,10.5,0,Math.PI*2);c.fill();
    c.fillStyle=ch.shirt;c.fillRect(-10,-22+bob,20,3);
    c.fillStyle=ch.skin;c.beginPath();c.arc(-10,-16+bob,3,0,Math.PI*2);c.fill();c.beginPath();c.arc(10,-16+bob,3,0,Math.PI*2);c.fill();
  }
  c.restore();
}

// ====== DRAW CELEBRATION (winner jumping) ======
function drawWinner(x,y,ch,timer){
  c.save();c.translate(Math.round(x),Math.round(y));
  var jumpH=Math.abs(Math.sin(timer*0.07))*16;
  var armAngle=Math.sin(timer*0.1)*0.5;
  c.translate(0,-jumpH);

  // Shadow (stays on ground)
  c.save();c.translate(0,jumpH);
  c.fillStyle='rgba(0,0,0,0.1)';c.beginPath();c.ellipse(0,26,14-jumpH*0.3,4,0,0,Math.PI*2);c.fill();
  c.restore();

  // Legs together
  c.fillStyle=ch.skin;c.fillRect(-4,12,3,10);c.fillRect(1,12,3,10);
  c.fillStyle='#fff';c.fillRect(-5,20,5,4);c.fillRect(0,20,5,4);
  c.fillStyle=ch.shorts;c.fillRect(-6,6,12,8);
  c.fillStyle=ch.shirt;c.fillRect(-8,-8,16,16);
  c.fillStyle=ch.trim;c.fillRect(-8,-8,16,2);
  // Arms UP celebrating
  c.fillStyle=ch.skin;
  c.save();c.translate(-9,-6);c.rotate(-0.8+armAngle);c.fillRect(0,-2,4,16);c.restore();
  c.save();c.translate(9,-6);c.rotate(0.8-armAngle);c.fillRect(-4,-2,4,16);c.restore();
  // Head
  c.fillStyle=ch.skin;c.beginPath();c.arc(0,-16,10,0,Math.PI*2);c.fill();
  c.fillStyle=ch.hair;c.beginPath();c.arc(0,-19,10,Math.PI,2*Math.PI);c.fill();c.fillRect(-10,-26,20,5);
  c.fillStyle=ch.shirt;c.fillRect(-10,-22,20,3);
  // Happy face
  c.fillStyle='#222';c.beginPath();c.arc(-4,-17,1.5,0,Math.PI*2);c.fill();c.beginPath();c.arc(4,-17,1.5,0,Math.PI*2);c.fill();
  // Big smile
  c.strokeStyle='#b0785a';c.lineWidth=2;c.lineCap='round';
  c.beginPath();c.arc(0,-12,4,0.2,Math.PI-0.2);c.stroke();

  c.restore();
}

// ====== DRAW LOSER (on knees, crying) ======
function drawLoser(x,y,ch,timer,tears){
  c.save();c.translate(Math.round(x),Math.round(y));

  // Shadow
  c.fillStyle='rgba(0,0,0,0.1)';c.beginPath();c.ellipse(0,16,16,5,0,0,Math.PI*2);c.fill();

  // Kneeling: no standing legs, folded
  // Lower legs folded under
  c.fillStyle=ch.skin;c.fillRect(-8,8,5,6);c.fillRect(3,8,5,6);
  c.fillStyle='#fff';c.fillRect(-9,12,7,4);c.fillRect(2,12,7,4);
  // Shorts
  c.fillStyle=ch.shorts;c.fillRect(-7,2,14,8);
  // Shirt (hunched)
  c.fillStyle=ch.shirt;c.fillRect(-9,-10,18,14);
  c.fillStyle=ch.trim;c.fillRect(-9,-10,18,2);
  // Arms hanging down sadly
  c.fillStyle=ch.skin;c.fillRect(-12,-4,3,12);c.fillRect(9,-4,3,12);
  // Head drooping
  var headDroop=3+Math.sin(timer*0.04)*2;
  c.fillStyle=ch.skin;c.beginPath();c.arc(0,-16+headDroop,10,0,Math.PI*2);c.fill();
  c.fillStyle=ch.hair;c.beginPath();c.arc(0,-19+headDroop,10,Math.PI,2*Math.PI);c.fill();c.fillRect(-10,-26+headDroop,20,5);
  c.fillStyle=ch.shirt;c.fillRect(-10,-22+headDroop,20,3);
  // Sad face
  c.fillStyle='#222';
  // Closed sad eyes (lines)
  c.strokeStyle='#222';c.lineWidth=1.5;c.lineCap='round';
  c.beginPath();c.moveTo(-6,-17+headDroop);c.lineTo(-2,-16+headDroop);c.stroke();
  c.beginPath();c.moveTo(2,-16+headDroop);c.lineTo(6,-17+headDroop);c.stroke();
  // Sad mouth
  c.strokeStyle='#b0785a';c.lineWidth=1.5;
  c.beginPath();c.arc(0,-10+headDroop,3,Math.PI+0.3,2*Math.PI-0.3);c.stroke();

  // TEARS
  for(var i=0;i<tears.length;i++){
    var t=tears[i];
    t.age++;
    if(t.age<t.delay)continue;
    var realAge=t.age-t.delay;
    var side=(i%2===0)?-5:5;
    var tx=side+t.vx*realAge;
    var ty=-14+headDroop+t.vy*realAge;
    if(ty>30){t.age=0;continue;} // reset tear
    var alpha=1-Math.min(1,realAge/80);
    c.globalAlpha=alpha*0.7;
    c.fillStyle='#64b5f6';
    c.beginPath();c.arc(tx,ty,2,0,Math.PI*2);c.fill();
    // Teardrop shape
    c.beginPath();c.moveTo(tx,ty-2);c.lineTo(tx-1.5,ty+1);c.lineTo(tx+1.5,ty+1);c.fill();
    c.globalAlpha=1;
  }

  c.restore();
}

// ====== STAMINA BAR ======
function drawStaminaBar(x,y,pct,col){
  var w=30,h=4;
  c.fillStyle='rgba(0,0,0,0.25)';
  c.fillRect(x-w/2,y,w,h);
  var barCol=pct>0.6?'#66bb6a':pct>0.35?'#ffa726':'#ef5350';
  c.fillStyle=barCol;
  c.fillRect(x-w/2,y,w*pct,h);
  c.strokeStyle='rgba(255,255,255,0.3)';c.lineWidth=0.5;
  c.strokeRect(x-w/2,y,w,h);
}

// ====== DRAW ======
function draw(){
  calcCourt();
  var g=c.createLinearGradient(0,0,0,CH);g.addColorStop(0,'#87ceeb');g.addColorStop(1,'#b3e5fc');
  c.fillStyle=g;c.fillRect(0,0,CW,CH);

  // Court
  c.fillStyle='#64b5f6';c.fillRect(CL,CT,CR-CL,CB-CT);
  c.strokeStyle='#fff';c.lineWidth=2;c.strokeRect(CL,CT,CR-CL,CB-CT);
  var hw=(CR-CL)/2;
  c.strokeStyle='rgba(255,255,255,0.5)';c.lineWidth=1.5;
  c.strokeRect(CL,NY-(NY-CT)*0.45,hw,(NY-CT)*0.45);c.strokeRect(CL+hw,NY-(NY-CT)*0.45,hw,(NY-CT)*0.45);
  c.strokeRect(CL,NY+4,hw,(CB-NY)*0.4);c.strokeRect(CL+hw,NY+4,hw,(CB-NY)*0.4);
  c.strokeStyle='rgba(255,255,255,0.2)';c.lineWidth=1;c.setLineDash([6,4]);
  c.beginPath();c.moveTo(CW/2,CT);c.lineTo(CW/2,CB);c.stroke();c.setLineDash([]);
  // Net
  c.fillStyle='rgba(0,0,0,0.06)';c.fillRect(CL,NY-1,CR-CL,6);
  c.strokeStyle='#fff';c.lineWidth=2;c.beginPath();c.moveTo(CL,NY);c.lineTo(CR,NY);c.stroke();
  c.beginPath();c.moveTo(CL,NY+3);c.lineTo(CR,NY+3);c.stroke();
  c.strokeStyle='rgba(255,255,255,0.35)';c.lineWidth=1;
  for(var xx=CL;xx<=CR;xx+=8){c.beginPath();c.moveTo(xx,NY);c.lineTo(xx,NY+3);c.stroke();}
  c.fillStyle='#888';c.fillRect(CL-3,NY-4,6,12);c.fillRect(CR-3,NY-4,6,12);

  // ====== CELEBRATION or normal play ======
  if(celebTimer>0){
    var winnerIsP=(celebWinner==='p');
    var wChar=winnerIsP?playerChar:cpuChar;
    var lChar=winnerIsP?cpuChar:playerChar;
    var wX=winnerIsP?ppx:cpx, wY=winnerIsP?ppy:cpy;
    var lX=winnerIsP?cpx:ppx, lY=winnerIsP?cpy:ppy;

    drawLoser(lX,lY,lChar,260-celebTimer,celebTears);
    drawWinner(wX,wY,wChar,260-celebTimer);

    // Flash text
    var msg=(winnerIsP?playerChar.name:cpuChar.name)+' gewinnt das Spiel!';
    c.globalAlpha=Math.min(1,(260-celebTimer)/15);
    c.fillStyle='rgba(0,0,0,0.45)';c.fillRect(0,CH/2-28,CW,56);
    c.fillStyle='#fff';c.font='bold 17px Outfit,sans-serif';c.textAlign='center';c.textBaseline='middle';
    c.fillText(msg,CW/2,CH/2);
    c.globalAlpha=1;
    return;
  }

  if(!playing&&!serving)return;

  // TOP player = CPU (hunches when tired)
  if(cpuChar){
    var cStam2=1.0-(1.0-cpuChar.stamina)*(gamesP+gamesC)*0.06;if(cStam2<0.55)cStam2=0.55;
    drawPerson(cpx,cpy+(cStam2<0.65?3:0),true,cpuChar,swC);
    drawStaminaBar(cpx,cpy+30,cStam2,cpuChar.shirt);
  }
  // BOTTOM player = You (hunches when tired)
  if(playerChar){
    var pStam2=1.0-(1.0-playerChar.stamina)*(gamesP+gamesC)*0.06;if(pStam2<0.55)pStam2=0.55;
    drawPerson(ppx,ppy+(pStam2<0.65?3:0),false,playerChar,swP);
    drawStaminaBar(ppx,ppy+30,pStam2,playerChar.shirt);
  }

  // Sweat particles
  for(var i=0;i<sweatParts.length;i++){
    var sw2=sweatParts[i];c.globalAlpha=sw2.l/25*0.6;c.fillStyle='#64b5f6';
    c.beginPath();c.arc(sw2.x,sw2.y,1.5,0,Math.PI*2);c.fill();
  }
  c.globalAlpha=1;

  // Perfect hit flash
  if(perfectHit>0){
    c.globalAlpha=perfectHit/20*0.35;c.fillStyle='#fff';
    c.beginPath();c.arc(bx,by-ballZ*2,25,0,Math.PI*2);c.fill();c.globalAlpha=1;
  }

  // Ball
  if(bOn||serving){
    var shSize=8+ballZ*1.2;
    var shAlpha=0.15-ballZ*0.008;if(shAlpha<0.03)shAlpha=0.03;
    c.fillStyle='rgba(0,0,0,'+shAlpha+')';
    c.beginPath();c.ellipse(bx+2,by+5+ballZ*0.5,shSize,shSize*0.4,0,0,Math.PI*2);c.fill();
    var ballDrawY=by-ballZ*2;
    // Spin trail
    if(bOn&&Math.abs(ballSpin)>0.05){
      c.globalAlpha=0.2;c.fillStyle=ballSpin>0?'#ff8a80':'#80d8ff';
      c.beginPath();c.arc(bx-bvx*2,ballDrawY-bvy*2,5,0,Math.PI*2);c.fill();c.globalAlpha=1;
    }
    var ballR=8+ballZ*0.3;
    var bg=c.createRadialGradient(bx-2,ballDrawY-2,1,bx,ballDrawY,ballR);
    bg.addColorStop(0,'#eeff41');bg.addColorStop(1,'#aeea00');
    c.fillStyle=bg;c.beginPath();c.arc(bx,ballDrawY,ballR,0,Math.PI*2);c.fill();
    c.strokeStyle='rgba(255,255,255,0.4)';c.lineWidth=1;
    c.beginPath();c.arc(bx,ballDrawY,ballR*0.6,-.5,1.2);c.stroke();
    if(ballZ>8){c.fillStyle='rgba(255,255,255,0.5)';c.font='bold 9px Outfit';c.textAlign='center';c.fillText('↑',bx,ballDrawY-ballR-4);}
  }

  for(var i=0;i<particles.length;i++){var p=particles[i];c.globalAlpha=p.l/25;c.fillStyle=p.c;c.beginPath();c.arc(p.x,p.y,3,0,Math.PI*2);c.fill();}c.globalAlpha=1;

  // Matchball / Spielball display
  if(matchPointTimer>0&&matchPointMsg){
    c.globalAlpha=Math.min(1,matchPointTimer/30);
    c.font='bold 14px Outfit,sans-serif';
    c.fillStyle='rgba(220,40,40,0.85)';
    var tw=c.measureText(matchPointMsg).width+40;
    c.fillRect(CW/2-tw/2,NY+20,tw,32);
    c.fillStyle='#fff';c.textAlign='center';c.textBaseline='middle';
    c.fillText(matchPointMsg,CW/2,NY+36);
    c.globalAlpha=1;
  }
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();

// Install hint
(function(){
  if(window.matchMedia('(display-mode: standalone)').matches) return; // already installed
  if(localStorage.getItem('fnk-install-dismissed')) return;
  var hint=document.getElementById('install-hint');
  var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  var isAndroid=/Android/.test(navigator.userAgent);
  if(!isIOS&&!isAndroid) return;
  var txt=document.getElementById('ih-text');
  if(isIOS) txt.innerHTML='Tippe auf <strong>Teilen</strong> <span style="font-size:18px">⬆</span> und dann <strong>"Zum Home-Bildschirm"</strong>';
  else txt.innerHTML='Tippe auf <strong>⋮ Menü</strong> und dann <strong>"Zum Startbildschirm hinzufügen"</strong>';
  setTimeout(function(){hint.style.display='flex';},2000);
  document.getElementById('ih-close').addEventListener('click',function(){
    hint.style.display='none';
    localStorage.setItem('fnk-install-dismissed','1');
  });
})();
})();
</script>
<div id="install-hint">
<button class="ih-close" id="ih-close">✕</button>
<div class="ih-icon">📲</div>
<div class="ih-title">FNK Padel als App installieren</div>
<div class="ih-text" id="ih-text">Tippe auf <strong>Teilen</strong> ↗ und dann <strong>"Zum Home-Bildschirm"</strong></div>
</div>
